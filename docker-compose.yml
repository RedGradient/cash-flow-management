services:
  app:
    container_name: cashflow-app
    build: .
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  
  postgres:
    image: postgres:16-alpine
    container_name: cashflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cashflow}
      POSTGRES_USER: ${POSTGRES_USER:-cashflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cashflow_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cashflow_user} -d ${POSTGRES_DB:-cashflow}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data: