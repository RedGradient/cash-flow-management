[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [".venv", "migrations", "transactions/seed.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ"]

[tool.ruff.lint.per-file-ignores]
"config/settings.py" = ["E501"]
"transactions/models.py" = ["DJ001", "DJ012"]

[tool.ruff.lint.isort]
known-first-party = ["config", "transactions"]

[tool.mypy]
python_version = "3.12"
plugins = ["mypy_django_plugin.main"]
exclude = [".venv", "migrations", "transactions/seed.py"]

[tool.django-stubs]
django_settings_module = "config.settings"

[[tool.mypy.overrides]]
module = ["rest_framework.*"]
ignore_missing_imports = true

[tool.coverage.run]
source = ["transactions", "config"]
omit = [
    "*/migrations/*",
    "*/tests.py",
    "transactions/seed.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
